startCommand:
  type: stdio
  configSchema:
    type: object
    required:
      - vocametrixApiKey
    properties:
      vocametrixApiKey:
        type: string
        title: Vocametrix API Key
        description: >
          Your Vocametrix API key. Get one at https://www.vocametrix.com/registration
          — free trial includes 5 minutes of analysis or 5 API credits.
  commandFunction: |-
    (config) => ({
      command: "npx",
      args: ["-y", "@vocametrix/mcp-server"],
      env: { VOCAMETRIX_API_KEY: config.vocametrixApiKey }
    })
